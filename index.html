<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Patient Forms</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    h1 { margin-bottom: 10px; }
    a { display: block; margin: 5px 0; }
  </style>
</head>
<body>

<h1>Patient Forms</h1>

<h2>➕ New Patient</h2>
<a href="https://docs.google.com/forms/d/e/1FAIpQLSdjuGEcYiJK-8mUPPNKpvnGTtnNM6elnnbamZeLwai4P_P9bw/viewform?usp=header" target="_blank">
  Create New Patient
</a>

<h2>📋 Existing Patients</h2>
<div id="list">Loading...</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/pub?output=csv";

fetch(sheetURL)
  .then(response => response.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1); // skip header
    const container = document.getElementById("list");
    container.innerHTML = "";

    rows.forEach(row => {
      const cols = row.split(",");
      const patientId = cols[0];
      const link = cols[1];

      if (patientId && link) {
        const a = document.createElement("a");
        a.href = link;
        a.target = "_blank";
        a.textContent = "Patient " + patientId;
        container.appendChild(a);
      }
    });
  })
  .catch(err => {
    document.getElementById("list").innerText = "Error loading data";
    console.error(err);
  });
</script>

</body>
</html>
